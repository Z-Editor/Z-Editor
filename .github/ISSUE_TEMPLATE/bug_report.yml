name: Bug report
description: Something in Z-Editor is broken or behaves unexpectedly.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What went wrong, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the editor
        2. Click ...
        3. See error
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser & OS
      placeholder: e.g. Chrome 126 on macOS 14
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Screenshots or console errors (optional)
